name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Rust Checks (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install nightly Rust toolchain for eBPF builds
        run: rustup toolchain install nightly --profile minimal --component rust-src

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install bpf-linker
        run: cargo install --locked bpf-linker

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build release binary
        run: cargo build --release

      - name: Upload release binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: tracepoint-demo-${{ matrix.arch }}
          path: target/release/tracepoint-demo
          if-no-files-found: error

      - name: Run userspace tests
        run: cargo test -p tracepoint-demo

      - name: Run eBPF helper tests
        run: cargo test -p tracepoint-demo-ebpf --lib

  dispatch-release:
    name: Dispatch Release
    needs:
      - ci
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.ci.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release workflow for semver tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Skipping release dispatch for non-release tag: $TAG"
            exit 0
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping dispatch."
            exit 0
          fi

          gh workflow run release.yml --repo "$REPO" --ref "$TAG" -f tag="$TAG"
