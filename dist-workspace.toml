[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Build only the packages that are actually released, instead of the whole workspace.
precise-builds = true
# Run release automation via workflow_dispatch so CI can gate the release on success.
dispatch-releases = true
# CI backends to support
ci = "github"
# Release CI runs only for the daemon crate.
pr-run-mode = "skip"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]
# Extra setup that both release build jobs need before dist builds the binary.
github-build-setup = "../build-setup.yml"
# Where to host releases
hosting = "github"
# GitHub-hosted runners for the Linux release builds.
[dist.github-custom-runners]
global = "ubuntu-22.04"
aarch64-unknown-linux-gnu = "ubuntu-22.04-arm"
x86_64-unknown-linux-gnu = "ubuntu-22.04"
